<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Review Form</title>
  <meta name="description" content="Submit a product review form and share ratings, features, installation date, and comments about the product.">
  <meta name="author" content="Eugenia Schulz">
  <link rel="stylesheet" href="styles/review.css">
  <script src="scripts/review.js" defer></script>
</head>
<body>
  <header>
    <h1>Product Review Form</h1>
  </header>

  <main>
    <form method="get" action="review.html">
      
      <div class="form-item">
        <label for="productName">Product Name</label>
        <select id="productName" name="productName" required>
          <option value="" disabled selected>Select a Product ...</option>
        </select>
      </div>

      <fieldset class="form-item rating-fieldset">
        <legend>Overall Rating</legend>

        <div class="rating-group">
          <div class="rating-option">
            <label for="rating1">★</label>
            <input type="radio" id="rating1" name="rating" value="1" required>
          </div>

          <div class="rating-option">
            <label for="rating2">★★</label>
            <input type="radio" id="rating2" name="rating" value="2" required>
          </div>

          <div class="rating-option">
            <label for="rating3">★★★</label>
            <input type="radio" id="rating3" name="rating" value="3" required>
          </div>

          <div class="rating-option">
            <label for="rating4">★★★★</label>
            <input type="radio" id="rating4" name="rating" value="4" required>
          </div>

          <div class="rating-option">
            <label for="rating5">★★★★★</label>
            <input type="radio" id="rating5" name="rating" value="5" required>
          </div>
        </div>
      </fieldset>

      <div class="form-item">
        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required>
      </div>

      <fieldset class="form-item features-fieldset">
        <legend>Which features did you find useful in the product?<br><span>(Check all that apply)</span></legend>

        <div class="checkbox-option">
          <input type="checkbox" id="durability" name="features" value="Durability">
          <label for="durability">Durability</label>
        </div>

        <div class="checkbox-option">
          <input type="checkbox" id="easeOfUse" name="features" value="Ease of Use">
          <label for="easeOfUse">Ease of Use</label>
        </div>

        <div class="checkbox-option">
          <input type="checkbox" id="performance" name="features" value="Performance">
          <label for="performance">Performance</label>
        </div>

        <div class="checkbox-option">
          <input type="checkbox" id="design" name="features" value="Design">
          <label for="design">Design</label>
        </div>
      </fieldset>

      <div class="form-item">
        <label for="writtenReview">Written Review <span>(Optional)</span></label>
        <textarea id="writtenReview" name="writtenReview" rows="7"></textarea>
      </div>

      <div class="form-item">
        <label for="userName">Your Name <span>(Optional)</span></label>
        <input type="text" id="userName" name="userName">
      </div>

      <div class="form-item">
        <input type="submit" value="Post Review">
      </div>
    </form>
  </main>

  <footer>
    <p>&copy; <span id="currentyear"></span> 🌸 Eugenia Schulz 🌸 Utah</p>
    <p id="lastModified"></p>
  </footer>
</body>
</html>
