<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buenos Aires</title>
    <meta name="description" content="A page about a place with weather and local information.">
    <meta name="author" content="Eugenia Schulz">

    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>

</head>
<body>
    <header>
        <h1>Buenos Aires, Argentina</h1>
    </header>

    <main>

       <section class="hero">
        <picture>
            <source srcset="images/buenos-aires-large" media="(min-width: 768px)">
            <img src="images/buenos-aires-small.webp" alt="El Ateneo Grand Splendid Library in Buenos Aires, Argentina" width="1200" height="600">
        </picture>
        </section>
        
        <section class="content">
            <section class="card">
                <h2>Data</h2>
                <ul>
                    <li><strong>Area:</strong>17,452 km <sup>2</sup></li>
                    <li><strong>Population:</strong>3.121.707</li>
                    <li><strong>Capital:</strong> Capital Federal</li>
                    <li><strong>Language:</strong> Spanish</li>
                    <li><strong>Currency:</strong> Argentine Peso</li>
                    <li><strong>Time Zone:</strong>UTC-3</li>

                </ul>
            </section>

            <section class="card weather">
                <h2>Weather</h2>
                <img src="images/sun.svg" alt="Weather icon" class="weather-icon">
                <ul>
                    <li><strong>Temperature:</strong> <span id="temperature">8</span> <sup>0</sup>C</li>
                    <li><strong>Conditions:</strong> Sunny</li>
                    <li><strong>Wind:</strong> <span id="winspeed">7</span> mi/h</li>
                    <li><strong>Wind Chill:</strong> <span id="windchill"></span></li>
                </ul>
            </section>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> 🌸 Eugenia Schulz 🌸</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
